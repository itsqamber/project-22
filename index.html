<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Calculator</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --panel-soft: #f7f9fc;
      --ink: #172033;
      --muted: #68738a;
      --line: #dbe2ef;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #14b8a6;
      --danger: #dc2626;
      --shadow: 0 24px 70px rgba(23, 32, 51, 0.18);
      --button-shadow: 0 10px 22px rgba(23, 32, 51, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(20, 184, 166, 0.18), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(37, 99, 235, 0.20), transparent 30%),
        linear-gradient(135deg, #eef2f7 0%, #dde7f4 48%, #f8fafc 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 28px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-nav {
      width: min(100%, 920px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(219, 226, 239, 0.9);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 42px rgba(23, 32, 51, 0.10);
    }

    .site-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 4px;
      font-weight: 800;
    }

    .site-brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }

    .site-links {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 7px;
    }

    .site-links a {
      padding: 8px 11px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .site-links a:hover,
    .site-links .active {
      color: var(--primary-dark);
      background: #eaf1ff;
    }

    .calculator-shell {
      width: min(100%, 420px);
      padding: 1px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(37, 99, 235, 0.35), rgba(20, 184, 166, 0.28));
      box-shadow: var(--shadow);
    }

    .calculator {
      border-radius: 27px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
      font-size: 18px;
    }

    .mode {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
    }

    .display {
      margin: 10px 22px 18px;
      padding: 22px 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, #172033 0%, #101827 100%);
      color: white;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
    }

    .history {
      min-height: 22px;
      color: #a8b3c7;
      text-align: right;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .current {
      color: #ffffff;
      text-align: right;
      font-size: clamp(34px, 10vw, 48px);
      line-height: 1.05;
      font-weight: 760;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 0 22px 24px;
    }

    button {
      min-height: 62px;
      border: 0;
      border-radius: 18px;
      background: var(--panel-soft);
      color: var(--ink);
      font: inherit;
      font-size: 20px;
      font-weight: 720;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease, color 150ms ease;
      user-select: none;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(23, 32, 51, 0.14);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 7px 15px rgba(23, 32, 51, 0.12);
    }

    .utility {
      color: var(--primary-dark);
      background: #eaf1ff;
    }

    .operator {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    .danger {
      color: var(--danger);
      background: #fff1f1;
    }

    .equals {
      grid-column: span 2;
      color: white;
      background: linear-gradient(135deg, var(--accent), #0f766e);
    }

    .zero {
      grid-column: span 2;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 0 22px 22px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    kbd {
      padding: 2px 6px;
      border-radius: 6px;
      background: #e8edf5;
      color: #3a4558;
      font: inherit;
    }

    @media (max-width: 430px) {
      body {
        padding: 14px;
      }

      .calculator-shell {
        border-radius: 22px;
      }

      .calculator {
        border-radius: 21px;
      }

      .keys {
        gap: 9px;
        padding-inline: 16px;
      }

      button {
        min-height: 56px;
        border-radius: 15px;
      }

      .topbar,
      .footer {
        padding-inline: 16px;
      }

      .display {
        margin-inline: 16px;
      }

      .site-nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-links {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a class="site-brand" href="home.html">
      <span class="site-brand-mark">D</span>
      <span>Digital Toolkit</span>
    </a>
    <div class="site-links">
      <a href="home.html">Home</a>
      <a href="introduction.html">Introduction</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="gallery.html">Gallery</a>
      <a href="signup.html">Sign Up</a>
      <a class="active" href="index.html">Calculator</a>
    </div>
  </nav>

  <main class="calculator-shell" aria-label="Calculator">
    <section class="calculator">
      <div class="topbar">
        <div class="brand">
          <span class="brand-mark">=</span>
          <span>Calculator Pro</span>
        </div>
        <span class="mode">Standard</span>
      </div>

      <div class="display" role="status" aria-live="polite">
        <div class="history" id="history"></div>
        <div class="current" id="current">0</div>
      </div>

      <div class="keys">
        <button class="danger" data-action="clear">AC</button>
        <button class="utility" data-action="backspace">⌫</button>
        <button class="utility" data-action="percent">%</button>
        <button class="operator" data-operator="/">÷</button>

        <button data-number="7">7</button>
        <button data-number="8">8</button>
        <button data-number="9">9</button>
        <button class="operator" data-operator="*">×</button>

        <button data-number="4">4</button>
        <button data-number="5">5</button>
        <button data-number="6">6</button>
        <button class="operator" data-operator="-">−</button>

        <button data-number="1">1</button>
        <button data-number="2">2</button>
        <button data-number="3">3</button>
        <button class="operator" data-operator="+">+</button>

        <button class="zero" data-number="0">0</button>
        <button data-action="decimal">.</button>
        <button class="equals" data-action="equals">=</button>
      </div>

      <div class="footer">
        <span><kbd>Esc</kbd> clear</span>
        <span><kbd>Enter</kbd> equals</span>
      </div>
    </section>
  </main>

  <script>
    const currentDisplay = document.getElementById("current");
    const historyDisplay = document.getElementById("history");

    const calculator = {
      current: "0",
      previous: "",
      operator: null,
      waitingForNumber: false
    };

    const operatorLabels = {
      "+": "+",
      "-": "−",
      "*": "×",
      "/": "÷"
    };

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "Error";

      const rounded = Math.round((value + Number.EPSILON) * 1e12) / 1e12;
      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits: 10
      }).format(rounded);
    }

    function displayValue(value) {
      if (value === "Error") return value;
      if (value.endsWith(".")) return value;

      const number = Number(value);
      if (Number.isNaN(number)) return "0";
      return formatNumber(number);
    }

    function updateDisplay() {
      currentDisplay.textContent = displayValue(calculator.current);
      historyDisplay.textContent = calculator.operator
        ? `${displayValue(calculator.previous)} ${operatorLabels[calculator.operator]}`
        : "";
    }

    function clearCalculator() {
      calculator.current = "0";
      calculator.previous = "";
      calculator.operator = null;
      calculator.waitingForNumber = false;
      updateDisplay();
    }

    function inputNumber(number) {
      if (calculator.current === "Error") clearCalculator();

      if (calculator.waitingForNumber) {
        calculator.current = number;
        calculator.waitingForNumber = false;
      } else {
        calculator.current = calculator.current === "0" ? number : calculator.current + number;
      }

      updateDisplay();
    }

    function inputDecimal() {
      if (calculator.current === "Error") clearCalculator();

      if (calculator.waitingForNumber) {
        calculator.current = "0.";
        calculator.waitingForNumber = false;
      } else if (!calculator.current.includes(".")) {
        calculator.current += ".";
      }

      updateDisplay();
    }

    function backspace() {
      if (calculator.waitingForNumber || calculator.current === "Error") return;
      calculator.current = calculator.current.length > 1 ? calculator.current.slice(0, -1) : "0";
      updateDisplay();
    }

    function percent() {
      if (calculator.current === "Error") return;
      calculator.current = String(Number(calculator.current) / 100);
      updateDisplay();
    }

    function calculate(firstValue, secondValue, operator) {
      switch (operator) {
        case "+":
          return firstValue + secondValue;
        case "-":
          return firstValue - secondValue;
        case "*":
          return firstValue * secondValue;
        case "/":
          return secondValue === 0 ? NaN : firstValue / secondValue;
        default:
          return secondValue;
      }
    }

    function chooseOperator(nextOperator) {
      if (calculator.current === "Error") clearCalculator();

      const currentValue = Number(calculator.current);

      if (calculator.operator && !calculator.waitingForNumber) {
        const result = calculate(Number(calculator.previous), currentValue, calculator.operator);
        calculator.current = Number.isFinite(result) ? String(result) : "Error";
        calculator.previous = calculator.current;
      } else {
        calculator.previous = calculator.current;
      }

      calculator.operator = nextOperator;
      calculator.waitingForNumber = true;
      updateDisplay();
    }

    function performEquals() {
      if (!calculator.operator || calculator.waitingForNumber || calculator.current === "Error") return;

      const firstValue = Number(calculator.previous);
      const secondValue = Number(calculator.current);
      const result = calculate(firstValue, secondValue, calculator.operator);

      historyDisplay.textContent = `${displayValue(calculator.previous)} ${operatorLabels[calculator.operator]} ${displayValue(calculator.current)} =`;
      calculator.current = Number.isFinite(result) ? String(result) : "Error";
      calculator.previous = "";
      calculator.operator = null;
      calculator.waitingForNumber = true;
      currentDisplay.textContent = displayValue(calculator.current);
    }

    document.querySelector(".keys").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      if (button.dataset.number) inputNumber(button.dataset.number);
      if (button.dataset.operator) chooseOperator(button.dataset.operator);
      if (button.dataset.action === "decimal") inputDecimal();
      if (button.dataset.action === "clear") clearCalculator();
      if (button.dataset.action === "backspace") backspace();
      if (button.dataset.action === "percent") percent();
      if (button.dataset.action === "equals") performEquals();
    });

    document.addEventListener("keydown", (event) => {
      const key = event.key;

      if (/^[0-9]$/.test(key)) inputNumber(key);
      if (key === ".") inputDecimal();
      if (["+", "-", "*", "/"].includes(key)) chooseOperator(key);
      if (key === "Enter" || key === "=") {
        event.preventDefault();
        performEquals();
      }
      if (key === "Backspace") backspace();
      if (key === "Escape") clearCalculator();
      if (key === "%") percent();
    });
  </script>
</body>
</html>
